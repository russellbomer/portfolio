name: Resume Review Reminder

on:
  schedule:
    # Run daily at 9am UTC — actual reminder fires only when nextReminderDate is reached
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if reminder is due
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          NEXT=$(node -e "const c = require('./apps/portfolio/config/resume.json'); console.log(c.nextReminderDate || '1970-01-01')")
          echo "Today: $TODAY, Next reminder: $NEXT"
          if [[ "$TODAY" >= "$NEXT" ]]; then
            echo "due=true" >> $GITHUB_OUTPUT
          else
            echo "due=false" >> $GITHUB_OUTPUT
          fi

      - name: Disable resume and schedule next reminder
        if: steps.check.outputs.due == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('apps/portfolio/config/resume.json', 'utf8'));
            const next = new Date();
            next.setMonth(next.getMonth() + 6);
            config.enabled = false;
            config.nextReminderDate = next.toISOString().slice(0, 10);
            fs.writeFileSync('apps/portfolio/config/resume.json', JSON.stringify(config, null, 2) + '\n');
          "

      - name: Commit and push
        if: steps.check.outputs.due == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/portfolio/config/resume.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: disable resume download button — review reminder"
            git push
          fi

      - name: Send email reminder
        if: steps.check.outputs.due == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: russellbomer@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Resume update reminder — portfolio download disabled"
          to: russellbomer@gmail.com
          from: russellbomer@gmail.com
          body: |
            Hey Russell,

            Your resume download button has been automatically disabled on your portfolio. Time to refresh it.

            To re-enable:
            1. git pull (the workflow committed a change to the repo)
            2. Drop your updated resume into apps/portfolio/public/resume.pdf (overwrite the existing file)
            3. Set "enabled": true in apps/portfolio/config/resume.json
            4. Commit and push — Vercel will redeploy and the button will reappear

            Repo: https://github.com/russellbomer/portfolio

            — GitHub Actions
